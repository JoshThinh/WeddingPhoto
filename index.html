<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wedding Photo Booth</title>
<style>
  :root{
    --cream:#fbf7f2;
    --gold:#b8935f;
    --gold-dark:#8f7148;
    --blush:#e8c9c3;
    --ink:#3a332e;
    --line:#e6ddd2;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  .app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:var(--white);
    box-shadow:0 0 40px rgba(0,0,0,0.06);
    display:flex;
    flex-direction:column;
  }
  header{
    text-align:center;
    padding:28px 20px 18px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#fffaf5,var(--white));
  }
  .names{
    font-family:'Brush Script MT', cursive;
    font-size:2.4em;
    color:var(--gold-dark);
    margin:0;
    line-height:1;
  }
  .sub{
    letter-spacing:2px;
    font-size:0.72em;
    text-transform:uppercase;
    color:#9c9088;
    margin-top:8px;
  }
  nav{
    display:flex;
    border-bottom:1px solid var(--line);
  }
  nav button{
    flex:1;
    padding:14px 8px;
    background:none;
    border:none;
    font-size:0.95em;
    color:#9c9088;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:all .2s;
  }
  nav button.active{
    color:var(--gold-dark);
    border-bottom-color:var(--gold);
    font-weight:600;
  }
  main{
    flex:1;
    padding:20px;
  }
  .view{display:none;}
  .view.active{display:block;}

  /* Camera view */
  #camWrap{
    position:relative;
    width:100%;
    aspect-ratio:3/4;
    background:#1a1714;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #video, #shotCanvas{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }
  #camPlaceholder{
    color:#cbb89e;
    text-align:center;
    padding:20px;
    font-size:0.9em;
  }
  #camPlaceholder button{
    margin-top:14px;
  }
  .flash{
    position:absolute;
    inset:0;
    background:#fff;
    opacity:0;
    pointer-events:none;
  }
  .flash.go{
    animation:flashPop .35s ease-out;
  }
  @keyframes flashPop{
    0%{opacity:0.85;}
    100%{opacity:0;}
  }
  .controls{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  input[type=text]{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:1em;
    margin-top:14px;
    background:var(--cream);
  }
  button{
    font-family:inherit;
    cursor:pointer;
  }
  .btn{
    padding:13px 18px;
    border-radius:10px;
    border:none;
    font-size:0.95em;
    font-weight:600;
    flex:1;
  }
  .btn-primary{
    background:var(--gold);
    color:#fff;
  }
  .btn-primary:active{background:var(--gold-dark);}
  .btn-secondary{
    background:var(--cream);
    color:var(--ink);
    border:1px solid var(--line);
  }
  .btn-full{width:100%;}
  .shutter{
    width:74px;
    height:74px;
    border-radius:50%;
    background:#fff;
    border:4px solid var(--gold);
    margin:18px auto 4px;
    display:block;
  }
  .shutter:active{transform:scale(0.94);}
  .hint{
    text-align:center;
    font-size:0.8em;
    color:#a89c8f;
    margin-top:6px;
  }
  #fileFallback{display:none;}
  .flipBtn{
    display:block;
    margin:10px auto 0;
    background:none;
    border:1px solid var(--line);
    color:var(--ink);
    padding:8px 16px;
    border-radius:20px;
    font-size:0.85em;
  }
  .flipBtn:active{background:var(--cream);}

  /* Gallery view */
  .galleryHead{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:14px;
  }
  .galleryHead h2{
    font-size:1.05em;
    margin:0;
    color:var(--gold-dark);
  }
  .count{
    font-size:0.8em;
    color:#a89c8f;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
  }
  .grid .cell{
    aspect-ratio:1/1;
    border-radius:8px;
    overflow:hidden;
    background:var(--cream);
    position:relative;
  }
  .grid .cell img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .empty{
    text-align:center;
    padding:60px 20px;
    color:#a89c8f;
  }
  .empty .big{font-size:2.4em; margin-bottom:8px;}
  .loading{
    text-align:center;
    padding:40px;
    color:#a89c8f;
    font-size:0.9em;
  }
  /* Lightbox */
  #lightbox{
    position:fixed;
    inset:0;
    background:rgba(20,16,12,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:50;
    padding:20px;
  }
  #lightbox.open{display:flex;}
  #lightbox img{
    max-width:100%;
    max-height:72vh;
    border-radius:10px;
  }
  #lightbox .lbName{
    color:#f2e9df;
    margin-top:14px;
    font-size:0.95em;
  }
  #lightbox .lbClose{
    position:absolute;
    top:20px;
    right:20px;
    background:none;
    border:none;
    color:#fff;
    font-size:1.6em;
    line-height:1;
  }
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--gold-dark);
    color:#fff;
    padding:12px 22px;
    border-radius:30px;
    font-size:0.9em;
    opacity:0;
    transition:all .3s;
    pointer-events:none;
    z-index:60;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  /* QR button + modal */
  .qrLink{
    margin-top:14px;
    background:none;
    border:1px solid var(--gold);
    color:var(--gold-dark);
    padding:8px 16px;
    border-radius:20px;
    font-size:0.85em;
  }
  .qrLink:active{background:var(--cream);}

  #qrModal{
    position:fixed;
    inset:0;
    background:rgba(20,16,12,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:70;
    padding:20px;
  }
  #qrModal.open{display:flex;}
  .qrCard{
    background:#fff;
    border-radius:18px;
    padding:32px 28px 26px;
    text-align:center;
    max-width:340px;
    width:100%;
    position:relative;
  }
  .qrCard h3{
    font-family:'Brush Script MT', cursive;
    font-size:1.8em;
    color:var(--gold-dark);
    margin:0 0 4px;
  }
  .qrCard p.qrSub{
    font-size:0.8em;
    color:#9c9088;
    margin:0 0 18px;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  #qrImg{
    width:100%;
    max-width:260px;
    border:8px solid var(--cream);
    border-radius:12px;
  }
  .qrUrl{
    margin-top:16px;
    font-size:0.75em;
    color:#a89c8f;
    word-break:break-all;
  }
  .qrActions{
    display:flex;
    gap:8px;
    margin-top:18px;
  }
  .qrClose{
    position:absolute;
    top:14px;
    right:16px;
    background:none;
    border:none;
    font-size:1.5em;
    color:#c9beb2;
    line-height:1;
  }

  #adminLoginModal{
    position:fixed;
    inset:0;
    background:rgba(20,16,12,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:80;
    padding:20px;
  }
  #adminLoginModal.open{display:flex;}

  #adminPanel{
    position:fixed;
    inset:0;
    background:var(--white);
    z-index:65;
    display:none;
    flex-direction:column;
  }
  #adminPanel.open{display:flex;}
  .adminBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    border-bottom:1px solid var(--line);
    font-weight:600;
    color:var(--gold-dark);
  }
  #adminBody{
    flex:1;
    overflow-y:auto;
    padding:16px 20px;
    max-width:520px;
    margin:0 auto;
    width:100%;
  }
  .adminGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
  }
  .adminCell{
    position:relative;
    aspect-ratio:1/1;
    border-radius:8px;
    overflow:hidden;
    background:var(--cream);
  }
  .adminCell img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .adminCell .delBtn{
    position:absolute;
    top:4px;
    right:4px;
    width:26px;
    height:26px;
    border-radius:50%;
    background:rgba(20,16,12,0.75);
    color:#fff;
    border:none;
    font-size:1em;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #slideshowModal{
    position:fixed;
    inset:0;
    background:#0e0c0a;
    z-index:90;
    display:none;
    flex-direction:column;
    padding:16px;
  }
  #slideshowModal.open{display:flex;}
  .slideTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#e8ddd0;
    font-size:0.85em;
    margin-bottom:10px;
  }
  .slideTop .qrClose{
    position:static;
    color:#e8ddd0;
  }
  #slideCanvas{
    width:100%;
    max-width:420px;
    margin:0 auto;
    flex:1;
    min-height:0;
    object-fit:contain;
    border-radius:12px;
    background:#000;
  }
  .slideControls{
    display:flex;
    gap:8px;
    margin-top:14px;
    max-width:420px;
    width:100%;
    margin-left:auto;
    margin-right:auto;
  }
  #slideExportStatus{
    text-align:center;
    color:#c9beb2;
    font-size:0.8em;
    margin-top:10px;
    min-height:1.2em;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="app">
  <header>
    <p class="names">Sarah &amp; James</p>
    <p class="sub">Share a moment from our day</p>
    <div style="display:flex; gap:8px; justify-content:center; margin-top:14px;">
      <button id="qrBtn" class="qrLink" style="margin-top:0;">📱 Show QR Code</button>
      <button id="adminBtn" class="qrLink" style="margin-top:0;">🔒 Admin</button>
    </div>
  </header>

  <nav>
    <button id="tabCam" class="active">📷 Take Photo</button>
    <button id="tabGal">🖼️ Gallery</button>
  </nav>

  <main>
    <!-- CAMERA VIEW -->
    <section id="viewCam" class="view active">
      <div id="camWrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="shotCanvas"></canvas>
        <div id="camPlaceholder">
          Tap below to turn on your camera<br>
          <button class="btn btn-primary" id="startCamBtn" style="margin-top:12px;">Enable Camera</button>
        </div>
        <div class="flash" id="flash"></div>
      </div>

      <button class="shutter" id="shutterBtn" style="display:none;"></button>
      <button class="flipBtn" id="flipBtn" style="display:none;">🔄 Flip Camera</button>
      <p class="hint" id="camHint" style="display:none;">Tap the circle to capture</p>

      <div id="fileFallback">
        <input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none;">
        <button class="btn btn-secondary btn-full" id="fileFallbackBtn">Use device camera instead</button>
      </div>

      <div id="reviewControls" style="display:none;">
        <input type="text" id="guestName" placeholder="Your name (optional)" maxlength="40">
        <div class="controls">
          <button class="btn btn-secondary" id="retakeBtn">Retake</button>
          <button class="btn btn-primary" id="saveBtn">Add to Gallery</button>
        </div>
      </div>
    </section>

    <!-- GALLERY VIEW -->
    <section id="viewGal" class="view">
      <div class="galleryHead">
        <h2>The Collage</h2>
        <span class="count" id="galCount"></span>
      </div>
      <button id="slideshowBtn" class="btn btn-primary btn-full" style="margin-bottom:14px;">▶️ Play Slideshow</button>
      <div id="galBody">
        <div class="loading">Loading photos…</div>
      </div>
    </section>
  </main>
</div>

<div id="lightbox">
  <button class="lbClose" id="lbClose">×</button>
  <img id="lbImg" src="">
  <div class="lbName" id="lbName"></div>
</div>

<div class="toast" id="toast"></div>

<div id="qrModal">
  <div class="qrCard">
    <button class="qrClose" id="qrClose">×</button>
    <h3>Sarah &amp; James</h3>
    <p class="qrSub">Scan to add your photos</p>
    <img id="qrImg" src="" alt="QR code">
    <div class="qrUrl" id="qrUrl"></div>
    <div class="qrActions">
      <button class="btn btn-secondary" id="copyLinkBtn">Copy Link</button>
      <button class="btn btn-primary" id="printQrBtn">Print</button>
    </div>
  </div>
</div>

<div id="adminLoginModal">
  <div class="qrCard">
    <button class="qrClose" id="adminLoginClose">×</button>
    <h3 style="font-family:'Helvetica Neue',Arial,sans-serif; font-size:1.1em; letter-spacing:0.5px;">Admin Login</h3>
    <input type="text" id="adminUser" placeholder="Username" style="margin-top:16px;">
    <input type="password" id="adminPass" placeholder="Password">
    <p id="adminLoginError" style="color:#c0524a; font-size:0.8em; display:none; margin:8px 0 0;">Incorrect username or password.</p>
    <div class="qrActions">
      <button class="btn btn-primary btn-full" id="adminLoginSubmit">Log In</button>
    </div>
  </div>
</div>

<div id="adminPanel">
  <div class="adminBar">
    <span>Manage Photos</span>
    <button id="adminExitBtn" class="btn btn-secondary" style="flex:none; padding:8px 14px;">Exit Admin</button>
  </div>
  <div id="adminBody">
    <div class="loading">Loading photos…</div>
  </div>
</div>

<div id="slideshowModal">
  <div class="slideTop">
    <span id="slideStatus">Loading photos…</span>
    <button class="qrClose" id="slideClose">×</button>
  </div>
  <canvas id="slideCanvas" width="720" height="1280"></canvas>
  <audio id="slideAudio" loop></audio>
  <div class="slideControls">
    <button class="btn btn-secondary" id="slidePlayPauseBtn">⏸ Pause</button>
    <button class="btn btn-secondary" id="slideMusicBtn">🎵 Add Music</button>
    <input type="file" id="slideMusicInput" accept="audio/*" style="display:none;">
  </div>
  <button class="btn btn-primary btn-full" id="slideExportBtn" style="margin-top:10px;">⬇️ Export as Video</button>
  <div id="slideExportStatus"></div>
</div>

<script>
(function(){
  // ---------- SUPABASE SETUP ----------
  const SUPABASE_URL = 'https://cwofgyvdgnkaprymmawt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3b2ZneXZkZ25rYXByeW1tYXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NDAwMzEsImV4cCI6MjA5OTIxNjAzMX0.gXrOLO3E9dTqOw4XeUWsELh8Cw2OTKk1kQLtAJaKARo';
  const BUCKET = 'photos';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const tabCam = document.getElementById('tabCam');
  const tabGal = document.getElementById('tabGal');
  const viewCam = document.getElementById('viewCam');
  const viewGal = document.getElementById('viewGal');

  const video = document.getElementById('video');
  const canvas = document.getElementById('shotCanvas');
  const camPlaceholder = document.getElementById('camPlaceholder');
  const startCamBtn = document.getElementById('startCamBtn');
  const shutterBtn = document.getElementById('shutterBtn');
  const flipBtn = document.getElementById('flipBtn');
  const camHint = document.getElementById('camHint');
  const flash = document.getElementById('flash');
  const fileFallback = document.getElementById('fileFallback');
  const fileFallbackBtn = document.getElementById('fileFallbackBtn');
  const fileInput = document.getElementById('fileInput');
  const reviewControls = document.getElementById('reviewControls');
  const guestNameInput = document.getElementById('guestName');
  const retakeBtn = document.getElementById('retakeBtn');
  const saveBtn = document.getElementById('saveBtn');

  const galBody = document.getElementById('galBody');
  const galCount = document.getElementById('galCount');

  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbName = document.getElementById('lbName');
  const lbClose = document.getElementById('lbClose');

  const toastEl = document.getElementById('toast');

  const qrBtn = document.getElementById('qrBtn');
  const qrModal = document.getElementById('qrModal');
  const qrClose = document.getElementById('qrClose');
  const qrImg = document.getElementById('qrImg');
  const qrUrl = document.getElementById('qrUrl');
  const copyLinkBtn = document.getElementById('copyLinkBtn');
  const printQrBtn = document.getElementById('printQrBtn');

  const adminBtn = document.getElementById('adminBtn');
  const adminLoginModal = document.getElementById('adminLoginModal');
  const adminLoginClose = document.getElementById('adminLoginClose');
  const adminUser = document.getElementById('adminUser');
  const adminPass = document.getElementById('adminPass');
  const adminLoginError = document.getElementById('adminLoginError');
  const adminLoginSubmit = document.getElementById('adminLoginSubmit');
  const adminPanel = document.getElementById('adminPanel');
  const adminExitBtn = document.getElementById('adminExitBtn');
  const adminBody = document.getElementById('adminBody');

  const slideshowBtn = document.getElementById('slideshowBtn');
  const slideshowModal = document.getElementById('slideshowModal');
  const slideClose = document.getElementById('slideClose');
  const slideCanvas = document.getElementById('slideCanvas');
  const slideStatus = document.getElementById('slideStatus');
  const slideAudio = document.getElementById('slideAudio');
  const slidePlayPauseBtn = document.getElementById('slidePlayPauseBtn');
  const slideMusicBtn = document.getElementById('slideMusicBtn');
  const slideMusicInput = document.getElementById('slideMusicInput');
  const slideExportBtn = document.getElementById('slideExportBtn');
  const slideExportStatus = document.getElementById('slideExportStatus');

  let loadedGalleryPhotos = [];

  const ADMIN_USER = 'josh';
  const ADMIN_PASS = 'joshiscool';
  let isAdmin = false;

  function currentPageUrl(){
    // Strip any hash/query so the QR always points to the clean app URL
    return window.location.origin + window.location.pathname;
  }

  qrBtn.addEventListener('click', ()=>{
    const url = currentPageUrl();
    const encoded = encodeURIComponent(url);
    qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encoded;
    qrUrl.textContent = url;
    qrModal.classList.add('open');
  });
  qrClose.addEventListener('click', ()=> qrModal.classList.remove('open'));
  qrModal.addEventListener('click', (e)=>{ if(e.target === qrModal) qrModal.classList.remove('open'); });

  copyLinkBtn.addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(currentPageUrl());
      showToast('Link copied!');
    }catch(e){
      showToast('Could not copy — copy manually');
    }
  });

  printQrBtn.addEventListener('click', ()=>{
    const w = window.open('', '_blank');
    w.document.write(
      '<html><head><title>Scan to add photos</title></head><body style="text-align:center;font-family:sans-serif;padding:40px;">' +
      '<h1 style="font-family:Georgia,serif;">Sarah &amp; James</h1>' +
      '<p style="text-transform:uppercase;letter-spacing:2px;color:#888;">Scan to add your photos</p>' +
      '<img src="' + qrImg.src + '" style="width:320px;height:320px;margin-top:20px;">' +
      '<p style="margin-top:20px;color:#aaa;font-size:0.8em;">' + currentPageUrl() + '</p>' +
      '</body></html>'
    );
    w.document.close();
    w.focus();
    setTimeout(()=> w.print(), 400);
  });

  let stream = null;
  let capturedDataUrl = null;
  let galleryLoaded = false;

  // ---------- ADMIN ----------
  adminBtn.addEventListener('click', ()=>{
    if(isAdmin){
      openAdminPanel();
    } else {
      adminUser.value = '';
      adminPass.value = '';
      adminLoginError.style.display = 'none';
      adminLoginModal.classList.add('open');
    }
  });
  adminLoginClose.addEventListener('click', ()=> adminLoginModal.classList.remove('open'));

  adminLoginSubmit.addEventListener('click', ()=>{
    if(adminUser.value === ADMIN_USER && adminPass.value === ADMIN_PASS){
      isAdmin = true;
      adminLoginModal.classList.remove('open');
      openAdminPanel();
    } else {
      adminLoginError.style.display = 'block';
    }
  });

  adminExitBtn.addEventListener('click', ()=>{
    adminPanel.classList.remove('open');
  });

  async function openAdminPanel(){
    adminPanel.classList.add('open');
    adminBody.innerHTML = '<div class="loading">Loading photos…</div>';
    try{
      const { data: files, error } = await sb.storage.from(BUCKET).list('', {
        limit: 1000,
        sortBy: { column: 'created_at', order: 'desc' }
      });
      if(error) throw error;
      const validFiles = (files || []).filter(f => f.name && f.name.endsWith('.jpg'));

      if(validFiles.length === 0){
        adminBody.innerHTML = '<div class="empty">No photos to manage yet.</div>';
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'adminGrid';
      validFiles.forEach(f=>{
        const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(f.name);
        const cell = document.createElement('div');
        cell.className = 'adminCell';
        const img = document.createElement('img');
        img.src = pub.publicUrl;
        img.loading = 'lazy';
        const delBtn = document.createElement('button');
        delBtn.className = 'delBtn';
        delBtn.textContent = '×';
        delBtn.addEventListener('click', ()=> deletePhoto(f.name, cell));
        cell.appendChild(img);
        cell.appendChild(delBtn);
        grid.appendChild(cell);
      });
      adminBody.innerHTML = '';
      adminBody.appendChild(grid);
    }catch(err){
      adminBody.innerHTML = '<div class="empty">Couldn\'t load photos.</div>';
    }
  }

  async function deletePhoto(fileName, cellEl){
    if(!confirm('Delete this photo? This cannot be undone.')) return;
    cellEl.style.opacity = '0.4';
    try{
      const { error } = await sb.storage.from(BUCKET).remove([fileName]);
      if(error) throw error;
      cellEl.remove();
      galleryLoaded = false; // force guest gallery to refresh next time it's opened
      showToast('Photo deleted');
    }catch(err){
      cellEl.style.opacity = '1';
      showToast('Could not delete — try again');
    }
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=> toastEl.classList.remove('show'), 2200);
  }

  // ---------- TAB SWITCHING ----------
  function switchTab(which){
    if(which === 'cam'){
      tabCam.classList.add('active');
      tabGal.classList.remove('active');
      viewCam.classList.add('active');
      viewGal.classList.remove('active');
    } else {
      tabGal.classList.add('active');
      tabCam.classList.remove('active');
      viewGal.classList.add('active');
      viewCam.classList.remove('active');
      loadGallery();
    }
  }
  tabCam.addEventListener('click', ()=> switchTab('cam'));
  tabGal.addEventListener('click', ()=> switchTab('gal'));

  // ---------- CAMERA ----------
  let currentFacingMode = 'user';

  async function startCamera(){
    try{
      if(stream){
        stream.getTracks().forEach(t=>t.stop());
        stream = null;
      }
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode },
        audio: false
      });
      video.srcObject = stream;
      video.style.display = 'block';
      camPlaceholder.style.display = 'none';
      shutterBtn.style.display = 'block';
      flipBtn.style.display = 'block';
      camHint.style.display = 'block';
      fileFallback.style.display = 'none';
    }catch(err){
      // Camera unavailable or denied — fall back to native file capture
      camPlaceholder.innerHTML = 'Camera access unavailable.<br>Use your device camera below instead.';
      fileFallback.style.display = 'block';
      flipBtn.style.display = 'none';
    }
  }

  startCamBtn.addEventListener('click', startCamera);

  flipBtn.addEventListener('click', ()=>{
    currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
    startCamera();
  });

  fileFallbackBtn.addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const resized = resizeImage(img);
        showReview(resized);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  shutterBtn.addEventListener('click', ()=>{
    if(!stream) return;
    flash.classList.remove('go');
    void flash.offsetWidth; // restart animation
    flash.classList.add('go');

    const w = video.videoWidth;
    const h = video.videoHeight;
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);

    const img = new Image();
    img.onload = ()=>{
      const resized = resizeImage(img);
      showReview(resized);
    };
    img.src = canvas.toDataURL('image/jpeg', 0.92);
  });

  function resizeImage(img){
    const maxDim = 900;
    let w = img.width, h = img.height;
    if(w > h && w > maxDim){ h = h * (maxDim/w); w = maxDim; }
    else if(h > maxDim){ w = w * (maxDim/h); h = maxDim; }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    return c.toDataURL('image/jpeg', 0.62);
  }

  function showReview(dataUrl){
    capturedDataUrl = dataUrl;
    stopCamera();
    video.style.display = 'none';
    canvas.style.display = 'block';
    canvas.getContext('2d'); // canvas already drawn if from camera
    // draw resized preview onto visible canvas
    const img = new Image();
    img.onload = ()=>{
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img,0,0);
    };
    img.src = dataUrl;

    shutterBtn.style.display = 'none';
    flipBtn.style.display = 'none';
    camHint.style.display = 'none';
    fileFallback.style.display = 'none';
    camPlaceholder.style.display = 'none';
    reviewControls.style.display = 'block';
  }

  function stopCamera(){
    if(stream){
      stream.getTracks().forEach(t=>t.stop());
      stream = null;
    }
  }

  retakeBtn.addEventListener('click', ()=>{
    capturedDataUrl = null;
    canvas.style.display = 'none';
    reviewControls.style.display = 'none';
    camPlaceholder.style.display = 'flex';
    camPlaceholder.innerHTML = 'Tap below to turn on your camera<br><button class="btn btn-primary" id="startCamBtn2" style="margin-top:12px;">Enable Camera</button>';
    document.getElementById('startCamBtn2').addEventListener('click', startCamera);
  });

  saveBtn.addEventListener('click', async ()=>{
    if(!capturedDataUrl) return;
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    try{
      const name = guestNameInput.value.trim() || 'Anonymous guest';
      const safeName = encodeURIComponent(name).replace(/[^a-zA-Z0-9%_-]/g, '');
      const fileName = Date.now() + '_' + safeName + '.jpg';

      const blob = await (await fetch(capturedDataUrl)).blob();
      const { error } = await sb.storage.from(BUCKET).upload(fileName, blob, {
        contentType: 'image/jpeg',
        upsert: false
      });
      if(error) throw error;
      showToast('Added to the gallery! 💛');
      guestNameInput.value = '';
      capturedDataUrl = null;
      canvas.style.display = 'none';
      reviewControls.style.display = 'none';
      camPlaceholder.style.display = 'flex';
      camPlaceholder.innerHTML = 'Tap below to turn on your camera<br><button class="btn btn-primary" id="startCamBtn3" style="margin-top:12px;">Enable Camera</button>';
      document.getElementById('startCamBtn3').addEventListener('click', startCamera);
      galleryLoaded = false;
    }catch(err){
      showToast('Could not save — try again');
    }
    saveBtn.disabled = false;
    saveBtn.textContent = 'Add to Gallery';
  });

  // ---------- GALLERY ----------
  async function loadGallery(){
    if(galleryLoaded) return;
    galBody.innerHTML = '<div class="loading">Loading photos…</div>';
    try{
      const { data: files, error } = await sb.storage.from(BUCKET).list('', {
        limit: 1000,
        sortBy: { column: 'created_at', order: 'desc' }
      });
      if(error) throw error;
      const validFiles = (files || []).filter(f => f.name && f.name.endsWith('.jpg'));

      if(validFiles.length === 0){
        galBody.innerHTML = '<div class="empty"><div class="big">📸</div>No photos yet.<br>Be the first to add one!</div>';
        galCount.textContent = '';
        galleryLoaded = true;
        return;
      }

      const photos = validFiles.map(f => {
        const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(f.name);
        // filename format: TIMESTAMP_ENCODEDNAME.jpg
        const match = f.name.match(/^(\d+)_(.*)\.jpg$/);
        let ts = 0, name = 'Anonymous guest';
        if(match){
          ts = parseInt(match[1], 10) || 0;
          try{ name = decodeURIComponent(match[2]) || 'Anonymous guest'; }catch(e){}
        }
        return { data: pub.publicUrl, name: name, ts: ts };
      });

      photos.sort((a,b)=> (b.ts||0) - (a.ts||0));
      loadedGalleryPhotos = photos;
      renderGallery(photos);
      galleryLoaded = true;
    }catch(err){
      galBody.innerHTML = '<div class="empty">Couldn\'t load the gallery. Pull to refresh and try again.</div>';
    }
  }

  function renderGallery(photos){
    galCount.textContent = photos.length + (photos.length===1 ? ' photo' : ' photos');
    const grid = document.createElement('div');
    grid.className = 'grid';
    photos.forEach(p=>{
      const cell = document.createElement('div');
      cell.className = 'cell';
      const img = document.createElement('img');
      img.src = p.data;
      img.loading = 'lazy';
      cell.appendChild(img);
      cell.addEventListener('click', ()=> openLightbox(p));
      grid.appendChild(cell);
    });
    galBody.innerHTML = '';
    galBody.appendChild(grid);
  }

  function openLightbox(p){
    lbImg.src = p.data;
    lbName.textContent = p.name || '';
    lightbox.classList.add('open');
  }
  lbClose.addEventListener('click', ()=> lightbox.classList.remove('open'));
  lightbox.addEventListener('click', (e)=>{ if(e.target === lightbox) lightbox.classList.remove('open'); });

  // ---------- SLIDESHOW ----------
  const SECONDS_PER_PHOTO = 4;
  const CANVAS_W = slideCanvas.width;
  const CANVAS_H = slideCanvas.height;
  const sctx = slideCanvas.getContext('2d');

  let slideImages = [];      // loaded Image() elements, same order as loadedGalleryPhotos
  let slidePlaying = true;
  let pausedOffset = 0;
  let playStartTime = 0;
  let rafId = null;
  let musicObjectUrl = null;
  let isRecording = false;
  let mediaRecorder = null;
  let recordedChunks = [];

  function currentOffset(){
    if(!slidePlaying) return pausedOffset;
    const speed = CANVAS_W / (SECONDS_PER_PHOTO * 1000); // px per ms
    return pausedOffset + (performance.now() - playStartTime) * speed;
  }

  // Draw one image "cover-fit" at a given x position on the canvas
  function drawCover(img, x){
    const imgRatio = img.width / img.height;
    const canvasRatio = CANVAS_W / CANVAS_H;
    let sw, sh, sx, sy;
    if(imgRatio > canvasRatio){
      sh = img.height;
      sw = sh * canvasRatio;
      sx = (img.width - sw) / 2;
      sy = 0;
    } else {
      sw = img.width;
      sh = sw / canvasRatio;
      sx = 0;
      sy = (img.height - sh) / 2;
    }
    sctx.drawImage(img, sx, sy, sw, sh, x, 0, CANVAS_W, CANVAS_H);
  }

  function drawFrame(offsetOverride){
    if(slideImages.length === 0) return;
    const totalWidth = slideImages.length * CANVAS_W;
    let offset = (typeof offsetOverride === 'number') ? offsetOverride : currentOffset();
    offset = ((offset % totalWidth) + totalWidth) % totalWidth;
    const idx = Math.floor(offset / CANVAS_W);
    const xPos = -(offset % CANVAS_W);
    sctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawCover(slideImages[idx], xPos);
    const nextIdx = (idx + 1) % slideImages.length;
    drawCover(slideImages[nextIdx], xPos + CANVAS_W);
  }

  function loopTick(){
    drawFrame();
    rafId = requestAnimationFrame(loopTick);
  }

  function preloadImages(photos){
    return Promise.all(photos.map(p => new Promise((resolve)=>{
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = ()=> resolve(img);
      img.onerror = ()=> resolve(null);
      img.src = p.data;
    }))).then(imgs => imgs.filter(Boolean));
  }

  slideshowBtn.addEventListener('click', async ()=>{
    if(loadedGalleryPhotos.length < 1){
      showToast('Add some photos first!');
      return;
    }
    slideshowModal.classList.add('open');
    slideStatus.textContent = 'Loading photos…';
    slideImages = await preloadImages(loadedGalleryPhotos);
    if(slideImages.length === 0){
      slideStatus.textContent = 'Could not load photos.';
      return;
    }
    slideStatus.textContent = slideImages.length + (slideImages.length===1 ? ' photo' : ' photos');
    pausedOffset = 0;
    playStartTime = performance.now();
    slidePlaying = true;
    slidePlayPauseBtn.textContent = '⏸ Pause';
    if(rafId) cancelAnimationFrame(rafId);
    loopTick();
  });

  slideClose.addEventListener('click', ()=>{
    slideshowModal.classList.remove('open');
    slidePlaying = false;
    if(rafId) cancelAnimationFrame(rafId);
    slideAudio.pause();
    if(isRecording && mediaRecorder && mediaRecorder.state !== 'inactive'){
      mediaRecorder.stop();
    }
  });

  slidePlayPauseBtn.addEventListener('click', ()=>{
    if(slidePlaying){
      pausedOffset = currentOffset();
      slidePlaying = false;
      slidePlayPauseBtn.textContent = '▶️ Play';
      slideAudio.pause();
    } else {
      playStartTime = performance.now();
      slidePlaying = true;
      slidePlayPauseBtn.textContent = '⏸ Pause';
      if(slideAudio.src) slideAudio.play().catch(()=>{});
    }
  });

  slideMusicBtn.addEventListener('click', ()=> slideMusicInput.click());
  slideMusicInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(musicObjectUrl) URL.revokeObjectURL(musicObjectUrl);
    musicObjectUrl = URL.createObjectURL(file);
    slideAudio.src = musicObjectUrl;
    slideAudio.currentTime = 0;
    if(slidePlaying) slideAudio.play().catch(()=>{});
    slideMusicBtn.textContent = '🎵 ' + (file.name.length > 18 ? file.name.slice(0,15)+'…' : file.name);
  });

  // ---------- VIDEO EXPORT ----------
  slideExportBtn.addEventListener('click', async ()=>{
    if(isRecording) return;
    if(slideImages.length === 0){
      showToast('Add some photos first!');
      return;
    }
    if(typeof MediaRecorder === 'undefined' || !slideCanvas.captureStream){
      slideExportStatus.textContent = 'Video export isn\'t supported in this browser. Try Chrome on Android or desktop.';
      return;
    }

    isRecording = true;
    slideExportBtn.disabled = true;
    slidePlayPauseBtn.disabled = true;
    recordedChunks = [];

    const fps = 30;
    const canvasStream = slideCanvas.captureStream(fps);
    let combinedStream = canvasStream;

    let audioStream = null;
    if(slideAudio.src && slideAudio.captureStream){
      try{
        audioStream = slideAudio.captureStream();
        combinedStream = new MediaStream([
          ...canvasStream.getVideoTracks(),
          ...audioStream.getAudioTracks()
        ]);
        slideAudio.currentTime = 0;
        await slideAudio.play().catch(()=>{});
      }catch(e){ /* audio capture not supported here, continue video-only */ }
    }

    const mimeCandidates = [
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm',
      'video/mp4'
    ];
    const mimeType = mimeCandidates.find(m => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) || '';

    try{
      mediaRecorder = mimeType ? new MediaRecorder(combinedStream, { mimeType }) : new MediaRecorder(combinedStream);
    }catch(e){
      slideExportStatus.textContent = 'Could not start recording on this browser.';
      isRecording = false;
      slideExportBtn.disabled = false;
      slidePlayPauseBtn.disabled = false;
      return;
    }

    mediaRecorder.ondataavailable = (e)=>{ if(e.data && e.data.size > 0) recordedChunks.push(e.data); };

    const durationMs = slideImages.length * SECONDS_PER_PHOTO * 1000;
    pausedOffset = 0;
    playStartTime = performance.now();
    slidePlaying = true;

    mediaRecorder.onstop = ()=>{
      isRecording = false;
      slideExportBtn.disabled = false;
      slidePlayPauseBtn.disabled = false;
      const outType = (mediaRecorder.mimeType || 'video/webm').split(';')[0];
      const blob = new Blob(recordedChunks, { type: outType });
      const url = URL.createObjectURL(blob);
      const ext = outType.includes('mp4') ? 'mp4' : 'webm';
      slideExportStatus.innerHTML = '';
      const link = document.createElement('a');
      link.href = url;
      link.download = 'wedding-slideshow.' + ext;
      link.className = 'btn btn-secondary btn-full';
      link.style.display = 'block';
      link.style.marginTop = '8px';
      link.style.textAlign = 'center';
      link.textContent = '💾 Save Video';
      slideExportStatus.appendChild(link);
    };

    mediaRecorder.start();

    const startedAt = performance.now();
    const progressTimer = setInterval(()=>{
      const pct = Math.min(100, Math.round(((performance.now()-startedAt)/durationMs)*100));
      slideExportStatus.textContent = 'Recording… ' + pct + '%';
    }, 300);

    setTimeout(()=>{
      clearInterval(progressTimer);
      if(mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }, durationMs + 150);
  });

})();
</script>
</body>
</html>
